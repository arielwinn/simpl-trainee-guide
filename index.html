<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABP/SIMPL | Your Assessment Dashboard Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg: "#FAFAF8", surface: "#FFFFFF", tint: "#F7F5F0", amber: "#9A7B2C",
  amberSub: "#FFF7E3", text: "#2D3039", text2: "#5A5E6B", border: "#E4E3DE",
  accent: "#C9A23D", green: "#2D6A4F", greenSub: "#E8F5E9",
};
const serif = "'Source Serif 4', Georgia, serif";
const sans = "'Source Sans 3', 'Segoe UI', sans-serif";
const ps = { fontFamily: sans, fontSize: 14.5, lineHeight: 1.75, color: C.text, margin: "0 0 14px" };

const TABS = [
  { id: "what", label: "What is this?", icon: "\u{1F3AF}" },
  { id: "how", label: "How does it work?", icon: "\u{1F4F1}" },
  { id: "dashboard", label: "My dashboard", icon: "\u{1F4CA}" },
  { id: "data", label: "My data & CCC", icon: "\u{1F50D}" },
];

const SCALE = [
  { level: "1", title: "Supervisor Performed", color: "#E74C3C", summary: "Resident was an observer.", detail: "The supervisor performed the activity. You observed but were not yet ready to actively participate in leading the care." },
  { level: "2", title: "Supervisor Led Care", color: "#E67E22", summary: "Supervisor directed the majority of care.", detail: "Required supervising physician(s) to direct the majority of the care. The supervisor led and you assisted or performed portions under close direction." },
  { level: "3", title: "Supervisor & Resident Co-Led", color: "#F1C40F", summary: "Supervisor directed some aspects of care.", detail: "Required supervising physician(s) to direct some aspects of the care. You and your supervisor co-led, with the supervisor stepping in to guide specific elements." },
  { level: "4", title: "Resident Led, Minimal Supervision", color: "#27AE60", summary: "You directed care; only small adjustments needed.", detail: "Resident directed care, supervision only led to small adjustments. You led the encounter and the supervisor's involvement was limited to minor refinements." },
  { level: "5", title: "Resident Led, No Supervision Needed", color: "#2D6A4F", summary: "Care would have been safe and effective without a supervisor.", detail: "May benefit from continued learning and growth; however, care would have been safe and effective without a supervisor. This does not mean you are done learning \u2014 it means for this encounter, you did not need someone overseeing the care." },
];

const CCC_SCALE = [
  { level: "1", title: "Observation Only", desc: "Supervisor performs. Trainee is not ready to actively participate." },
  { level: "2", title: "Performs with Supervisor Present", desc: "2A: Co-activity with supervisor. 2B: Supervisor in room, ready to step in." },
  { level: "3", title: "Performs with Supervisor Available", desc: "3A: Close support/oversight. 3B: Moderate support/oversight. Supervisor readily available but not always present." },
  { level: "4", title: "Limited Support & Oversight", desc: "Supervisor still required for safety but does not need to be readily available. NOT yet practice ready." },
  { level: "5", title: "Practice Ready", desc: "No supervisor required. Performs without supervision. Knows limits and seeks input when needed." },
];

/* ===== REUSABLE COMPONENTS ===== */

function FAQ({ question, children, open: defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const ref = useRef(null);
  const [h, setH] = useState(0);
  useEffect(() => { if (ref.current) setH(ref.current.scrollHeight); }, [open, children]);
  return (
    <div style={{ marginBottom: 6 }}>
      <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "flex-start", gap: 12, width: "100%", border: open ? "1px solid " + C.border : "1px solid transparent", background: open ? C.surface : "transparent", borderRadius: 10, padding: "14px 16px", cursor: "pointer", textAlign: "left", transition: "all .2s" }}
        onMouseEnter={e => { if (!open) { e.currentTarget.style.background = C.tint; e.currentTarget.style.borderColor = C.border; } }}
        onMouseLeave={e => { if (!open) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; } }}>
        <span style={{ color: C.amber, fontSize: 18, fontWeight: 400, flexShrink: 0, marginTop: -1, lineHeight: 1.3 }}>Q</span>
        <span style={{ fontFamily: serif, fontSize: 15.5, fontWeight: 700, color: C.text, lineHeight: 1.45 }}>{question}</span>
        <span style={{ marginLeft: "auto", color: C.amber, fontSize: 13, fontWeight: 700, flexShrink: 0, marginTop: 3, transition: "transform .2s", transform: open ? "rotate(90deg)" : "rotate(0)", display: "inline-block" }}>{"\u25B8"}</span>
      </button>
      <div style={{ maxHeight: open ? h + 20 : 0, overflow: "hidden", transition: "max-height .35s ease" }}>
        <div ref={ref} style={{ padding: "4px 16px 14px 46px", color: C.text2, fontFamily: sans, fontSize: 14.5, lineHeight: 1.72 }}>{children}</div>
      </div>
    </div>
  );
}

function Callout({ children, type = "amber" }) {
  return <div style={{ background: type === "green" ? C.greenSub : C.amberSub, borderLeft: "3px solid " + (type === "green" ? C.green : C.amber), borderRadius: "0 10px 10px 0", padding: "14px 18px", margin: "16px 0", fontFamily: serif, fontSize: 15, fontWeight: 600, color: C.text, lineHeight: 1.5 }}>{children}</div>;
}

function Tip({ children, def }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline" }}>
      <span onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)} onClick={() => setShow(!show)}
        style={{ color: C.amber, fontWeight: 600, borderBottom: "1.5px dotted " + C.accent, cursor: "help" }}>{children}</span>
      {show && <span style={{ position: "absolute", bottom: "calc(100% + 10px)", left: "50%", transform: "translateX(-50%)", background: C.text, color: "#F0F0EE", padding: "11px 15px", borderRadius: 10, fontSize: 13, lineHeight: 1.55, width: 280, zIndex: 100, boxShadow: "0 8px 30px rgba(0,0,0,.15)", fontFamily: sans, fontWeight: 400 }}>
        {def}<span style={{ position: "absolute", top: "100%", left: "50%", transform: "translateX(-50%)", borderLeft: "7px solid transparent", borderRight: "7px solid transparent", borderTop: "7px solid " + C.text }} />
      </span>}
    </span>
  );
}

function ExBox({ children }) {
  return <div style={{ background: C.tint, borderRadius: 10, padding: "14px 16px", border: "1px solid " + C.border, fontSize: 14, lineHeight: 1.65, color: C.text2, margin: "12px 0" }}>
    <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: ".12em", color: C.amber, fontWeight: 700, marginBottom: 6, fontFamily: sans }}>Example</div>
    {children}
  </div>;
}

function SH({ title, sub }) {
  return <>
    <h2 style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.text, margin: "0 0 5px", lineHeight: 1.3 }}>{title}</h2>
    {sub && <div style={{ fontFamily: sans, fontSize: 13, color: C.amber, fontWeight: 600, letterSpacing: ".02em", marginBottom: 20 }}>{sub}</div>}
  </>;
}

function Div() { return <div style={{ height: 1, background: C.border, margin: "28px 0" }} />; }

function LinkButton({ href, children }) {
  return <a href={href} target="_blank" rel="noopener noreferrer" style={{
    display: "inline-flex", alignItems: "center", gap: 6, background: C.amberSub, border: "1px solid " + C.accent,
    borderRadius: 8, padding: "8px 14px", fontFamily: sans, fontSize: 13, fontWeight: 600, color: C.amber,
    textDecoration: "none", margin: "4px 6px 4px 0", cursor: "pointer", transition: "all .15s",
  }}>{children} <span style={{ fontSize: 11 }}>{"\u2197"}</span></a>;
}

/* ===== TAB: WHAT IS THIS? ===== */

function TabWhat() {
  return <>
    <SH title="What is this?" sub="The big picture, quickly" />

    <FAQ question="Why are we doing this?" open={true}>
      <p style={ps}>The old approach to evaluating residents {"\u2014"} vague end-of-rotation forms completed weeks later based on general impressions {"\u2014"} was not good enough to serve patients, to serve you, or to serve the profession. This system uses specific, encounter-based assessments tied to the essential activities of a general pediatrician so you get real feedback on real clinical work.</p>
    </FAQ>

    <FAQ question="What does 'practice ready' mean?">
      <p style={ps}>Practice ready means you can provide safe, effective care for the essential activities of a general pediatrician without someone assigned to direct or oversee your work {"\u2014"} in a collaborative practice setting where you still consult colleagues, use resources, and work within teams.</p>
      <p style={ps}><strong>Not expert.</strong> The bar is foundational capability, not mastery.</p>
      <p style={ps}><strong>Not alone.</strong> Pediatrics is inherently collaborative. Think of getting a driver's license: you can drive without someone in the passenger seat, but you still use GPS and call for directions.</p>
      <p style={ps}><strong>Not expected on day one.</strong> That's the point of training. Many residents will advance well beyond this threshold by graduation.</p>
      <p style={{ ...ps, margin: 0 }}><strong>Same for everyone.</strong> The standard does not change based on fellowship plans or career path.</p>
    </FAQ>

    <FAQ question="What are EPAs?">
      <p style={ps}><Tip def="Entrustable Professional Activities are the essential tasks that define what a pediatrician does. Each represents a unit of clinical work that can be observed, assessed, and \u2014 when a trainee is ready \u2014 entrusted to them without supervision.">Entrustable Professional Activities (EPAs)</Tip> are the 12 essential tasks that define what a general pediatrician does {"\u2014"} from providing well-child care to managing acutely ill children. Instead of asking "does this resident have enough medical knowledge?", the system asks "can this resident manage an acutely ill child?" or "can this resident provide a well-child visit?"</p>
      <p style={{ ...ps, margin: "0 0 12px" }}>Together, the 12 EPAs define the scope of what it means to practice as a general pediatrician.</p>
      <LinkButton href="https://www.abp.org/sites/public/files/pdf/epas-general-pediatrics-summary.pdf">View the 12 EPAs</LinkButton>
    </FAQ>

    <FAQ question="What's changing in 2028?">
      <p style={ps}>Beginning in 2028, the ABP will require program directors to attest that graduates are practice ready across all EPAs as a prerequisite for initial certification. This replaces the current system where programs attest that graduates are "satisfactory" across general competency domains.</p>
      <p style={{ ...ps, margin: 0 }}>Current EPA assignments are developmental and are <strong>not reported to the ABP</strong>. They are intended to provide you with data to support your growth and to give your program more specific information to make decisions about your progress toward becoming practice ready {"\u2014"} which will become consequential in 2028.</p>
    </FAQ>

    <Callout>The required outcome of training for graduation and to be eligible to become board certified is to be practice ready across all of the General Pediatrics EPAs.</Callout>
  </>;
}

/* ===== TAB: HOW DOES IT WORK? ===== */

function TabHow() {
  const [selLevel, setSelLevel] = useState(null);
  return <>
    <SH title="How does it work?" sub="The platform and assessment tools" />

    <FAQ question="How is this different from old evaluations?" open={true}>
      <p style={ps}>Instead of one summary at the end of a rotation, faculty complete brief assessments tied to specific clinical encounters, close to the time they happen. Each assessment captures what you actually did, in a real clinical situation, as observed by the supervisor who was there.</p>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, margin: "4px 0 8px" }}>
        {[{ t: "End-of-Rotation", items: ["One form per rotation", "Completed days/weeks later", "Based on general impressions", "Vague, hard to act on"], bad: true },
          { t: "Workplace-Based (SIMPL)", items: ["Many forms per rotation", "Completed close to encounters", "Tied to specific activities", "Specific, actionable feedback"], bad: false }
        ].map((col, i) => (
          <div key={i} style={{ background: col.bad ? C.tint : C.amberSub, border: "1px solid " + C.border, borderRadius: 12, padding: "14px 12px" }}>
            <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 13.5, color: C.text, marginBottom: 8 }}>{col.t}</div>
            {col.items.map((item, j) => <div key={j} style={{ fontFamily: sans, fontSize: 12.5, color: C.text2, lineHeight: 1.6, paddingLeft: 12, position: "relative", marginBottom: 3 }}><span style={{ position: "absolute", left: 0 }}>{col.bad ? "\u2013" : "\u2713"}</span>{item}</div>)}
          </div>
        ))}
      </div>
    </FAQ>

    <FAQ question="What types of forms are there?">
      <p style={ps}><strong>EPA-Based Forms:</strong> The core of the platform. Each maps to one of the 12 General Pediatrics EPAs and includes a supervision rating, required narrative comments, and clinical context. Takes 1-3 minutes. Form titles use plain clinical language ("Acute Common Problem"), not formal EPA names.</p>
      <p style={ps}><strong>Narrative-Only Forms (KSAs):</strong> Written feedback (no supervision rating) on cross-cutting skills like communicating with families, knowing limits, professional behaviors, and promoting health equity.</p>
      <p style={{ ...ps, margin: 0 }}><strong>Longitudinal Continuity Clinic Assessment:</strong> Your continuity clinic preceptor's observations over multiple encounters. Because they observe you in the general pediatrics practice environment over time, this data is particularly valuable.</p>
    </FAQ>

    <FAQ question="What does the supervision scale mean?">
      <p style={{ ...ps, margin: "0 0 12px" }}>Each EPA-based assessment includes a rating: <em>How much supervision did the resident need when performing this activity?</em> This refers to supervision from any supervisor involved {"\u2014"} not just the person completing the form. Tap a level to learn more.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 5, margin: "0 0 8px" }}>
        {SCALE.map(s => (
          <button key={s.level} onClick={() => setSelLevel(selLevel === s.level ? null : s.level)}
            style={{ display: "flex", alignItems: "center", gap: 10, background: selLevel === s.level ? C.surface : "transparent", border: selLevel === s.level ? "1px solid " + C.border : "1px solid transparent", borderRadius: 10, padding: "9px 12px", cursor: "pointer", textAlign: "left", transition: "all .15s", width: "100%" }}
            onMouseEnter={e => { if (selLevel !== s.level) e.currentTarget.style.background = C.tint; }}
            onMouseLeave={e => { if (selLevel !== s.level) e.currentTarget.style.background = "transparent"; }}>
            <div style={{ width: 32, height: 32, borderRadius: 7, background: s.color + "18", color: s.color, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{s.level}</div>
            <div>
              <div style={{ fontFamily: serif, fontSize: 13.5, fontWeight: 700, color: C.text }}>{s.title}</div>
              <div style={{ fontFamily: sans, fontSize: 12, color: C.text2 }}>{s.summary}</div>
            </div>
          </button>
        ))}
      </div>
      {selLevel && (() => { const s = SCALE.find(x => x.level === selLevel); return (
        <div style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 10, padding: "12px 14px", margin: "6px 0 12px", fontFamily: sans, fontSize: 13.5, lineHeight: 1.65, color: C.text2 }}>
          <span style={{ fontWeight: 700, color: s.color }}>Level {s.level}:</span> {s.detail}
        </div>
      ); })()}
      <p style={{ fontFamily: sans, fontSize: 12.5, color: C.text2, fontStyle: "italic", margin: "6px 0 0", lineHeight: 1.6 }}>Each rating is retrospective: how much supervision was needed for this encounter, not how much was delivered.</p>
    </FAQ>

    <FAQ question="Why is the scale retrospective instead of prospective?">
      <p style={{ ...ps, margin: 0 }}>Ideally, an assessor would tell you what supervision you would need in future practice. That works in continuity clinic. But much of training happens on subspecialty rotations {"\u2014"} a pediatric oncologist supervising you on the wards may struggle to project what you would need in a general pediatrics office. A retrospective question is easier for faculty across all settings. Your CCC then translates the aggregate data into prospective judgments about readiness.</p>
    </FAQ>
  </>;
}

/* ===== TAB: MY DASHBOARD ===== */

function TabDashboard() {
  return <>
    <SH title="My dashboard" sub="Understanding and using what you see" />
    <p style={ps}>Your dashboard organizes your assessment data to reveal patterns: how your supervision ratings are trending over time, where you have more or less data across EPAs, and what the overall picture looks like.</p>

    <FAQ question="How many assessments do I need?" open={true}>
      <p style={ps}>We do not yet know exactly how many assessments per EPA are needed for defensible and equitable CCC decisions. What we do know: more assessments = a more accurate picture. Each one is low-stakes {"\u2014"} just one small piece of a much bigger puzzle. The system works best when there are many pieces.</p>
    </FAQ>

    <FAQ question="Does initiating assessments actually help?">
      <p style={{ ...ps, margin: 0 }}>Yes. If your program uses a model where you push assessments to faculty, the data show the more you initiate, the more you receive. More pushes also mean more that go uncompleted {"\u2014"} try not to let that discourage you. The completed ones still add up and move you forward.</p>
    </FAQ>

    <FAQ question="Why are some of my assessments incomplete?">
      <p style={{ ...ps, margin: 0 }}>This is normal. Faculty are learning new tools and workflows at the same time you are. We know this can be frustrating {"\u2014"} give each other grace as we all figure this out together. It gets better with time.</p>
    </FAQ>

    <Div />

    <FAQ question="How should I interpret my graphs and trends?" open={true}>
      <p style={ps}>Look for patterns over time, not snapshots. Look for growth, and also notice periods where growth may have plateaued or appears to have dipped.</p>
      <p style={ps}><strong>Normal growth is not always linear.</strong> We all have good days and days that aren't our best. We go from rotations where we feel comfortable to rotations where we might need more support. Dips and plateaus should be expected {"\u2014"} and they provide an opportunity for reflection.</p>
      <p style={{ ...ps, margin: 0 }}>If you see a plateau or dip, ask yourself: What's going on in this area? Do the narrative comments help me understand what I could work on? Can I use that to build an action plan?</p>
    </FAQ>

    <FAQ question="Should I focus on my average scores?">
      <p style={{ ...ps, margin: 0 }}>Neither you nor your CCC should rely on numerical averages alone. Each supervision rating reflects one judgment about one past encounter. Ratings, narrative comments, clinical context, sources, and patterns over time should all be interpreted together. No single number tells the story {"\u2014"} the whole picture does.</p>
    </FAQ>

    <FAQ question="How do I get the most out of narrative comments?" open={true}>
      <p style={ps}>Your narrative comments are your richest source of feedback. In this system, developmental feedback isn't always obvious {"\u2014"} it frequently lacks a label like "area for improvement," and frequently, it's not a deficiency. It's normal growth.</p>
      <ExBox>
        <span>A faculty member might write: <em style={{ color: C.text }}>"Managed the acute visit well and chose the right antibiotic, but could strengthen discharge counseling by checking back with the family about their understanding of the medication plan."</em></span>
        <div style={{ marginTop: 8, fontWeight: 600, color: C.text }}>That's not a red flag {"\u2014"} it's a growth opportunity sitting inside an otherwise strong assessment.</div>
      </ExBox>
      <p style={ps}>The real power comes from looking <strong>across your comments over time</strong>. Notice the evolution: Are multiple faculty noting the same area for growth? Is something that used to come up no longer appearing? Are the expectations and skills mentioned in your feedback getting progressively harder {"\u2014"} a sign you're being trusted with more? Are there themes in what you do well that you can build on?</p>
      <p style={{ ...ps, margin: 0 }}>Use these patterns in conversation with your faculty coach to set concrete learning goals and build your individualized learning plan.</p>
    </FAQ>

    <FAQ question="What if I don't know what to do with a comment?">
      <p style={{ ...ps, margin: 0 }}>If you receive feedback and aren't sure what to make of it or how to act on it, that's okay {"\u2014"} and it's a great reason to bring it to your faculty coach or a trusted mentor. They can help you interpret the feedback in context and decide whether and how to incorporate it into your learning plan.</p>
    </FAQ>

    <FAQ question="What if I'm worried a rating reflects bias?">
      <p style={{ ...ps, margin: 0 }}>If you feel a rating or comment may reflect bias rather than your actual performance, that concern is valid and important. Bring it to a trusted member of your program or your faculty coach. One of the goals of this system is to improve equity by building structures that promote fairness and mitigate bias {"\u2014"} and that only works if concerns are surfaced.</p>
    </FAQ>

    <FAQ question="Why don't the numbers always match the comments?">
      <p style={{ ...ps, margin: 0 }}>Faculty are still developing comfort with the supervision rating scales. Their numerical ratings may not always align with what they wrote in the narrative. This is a known challenge, especially early on. With more assessments, individual inconsistencies matter less and the overall pattern becomes clearer for you and your program.</p>
    </FAQ>
  </>;
}

/* ===== TAB: MY DATA & CCC ===== */

function TabData() {
  return <>
    <SH title="My data & CCC" sub="How your data is reviewed and used" />

    <FAQ question="How does my CCC use my data?" open={true}>
      <p style={ps}>Your <Tip def="A group of faculty and educators responsible for monitoring your progress and making decisions about your supervision needs across all EPAs.">Clinical Competency Committee (CCC)</Tip> reviews and synthesizes your aggregate assessment data: supervision ratings, narrative comments, clinical context, and patterns over time.</p>
      <p style={ps}><strong>Frontline ratings are retrospective:</strong> a supervisor reflects on how much supervision you needed for one past encounter.</p>
      <p style={{ ...ps, margin: 0 }}><strong>CCC decisions are prospective:</strong> the committee asks, "Could this trainee, practicing today without supervision, provide safe and effective care for this activity?"</p>
    </FAQ>

    <FAQ question="Is my program interpreting data the same way I should?">
      <p style={{ ...ps, margin: 0 }}>Yes. The approach described throughout this guide {"\u2014"} looking at patterns over snapshots, weighing narratives alongside ratings, understanding that growth isn't linear {"\u2014"} is the same approach your program and CCC should be using. The way you interpret your data aligns with how your progress is being evaluated.</p>
    </FAQ>

    <FAQ question="What scale does the CCC use?">
      <p style={{ ...ps, margin: "0 0 12px" }}>Your CCC uses its own scale (aligned with but distinct from the SIMPL frontline scale) to make summative decisions. When a CCC assigns Level 5, you are practice ready for that EPA.</p>
      <div style={{ display: "flex", flexDirection: "column", gap: 5 }}>
        {CCC_SCALE.map(s => (
          <div key={s.level} style={{ display: "flex", gap: 10, alignItems: "flex-start", padding: "7px 0" }}>
            <div style={{ width: 26, height: 26, borderRadius: 6, background: C.amberSub, color: C.amber, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: 700, fontSize: 12.5, flexShrink: 0 }}>{s.level}</div>
            <div><span style={{ fontFamily: serif, fontWeight: 700, fontSize: 13, color: C.text }}>{s.title}: </span><span style={{ fontFamily: sans, fontSize: 12.5, color: C.text2 }}>{s.desc}</span></div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 12 }}>
        <LinkButton href="https://www.abp.org/sites/public/files/pdf/cbme-supervision-scale-for-cccs.pdf">View the full CCC scale</LinkButton>
      </div>
    </FAQ>

    <FAQ question="Can one bad assessment hurt me?">
      <p style={{ ...ps, margin: 0 }}>With many data points from diverse faculty across settings and time, no single assessment should significantly influence a CCC determination. That's the whole point of frequent, low-stakes assessments {"\u2014"} the patterns matter, not any individual data point.</p>
    </FAQ>

    <FAQ question="Do my current EPA assignments count toward certification?">
      <p style={ps}>No. Current EPA assignments are developmental and are <strong>not reported to the ABP</strong>. They are intended to provide you with data to support your growth and to give your program more specific information to make decisions about your progress toward becoming practice ready {"\u2014"} which will become consequential in 2028.</p>
      <p style={{ ...ps, margin: 0 }}>Please provide feedback on the process {"\u2014"} your voice helps shape what comes next.</p>
    </FAQ>
  </>;
}

/* ===== APP ===== */

const TAB_MAP = { "what": TabWhat, "how": TabHow, "dashboard": TabDashboard, "data": TabData };

function App() {
  const [tab, setTab] = useState("what");
  const contentRef = useRef(null);
  const ActiveTab = TAB_MAP[tab];

  const switchTab = (id) => {
    setTab(id);
    if (contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: "smooth" });
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <header style={{ background: C.surface, padding: "40px 20px 32px", textAlign: "center", borderBottom: "1px solid " + C.border, flexShrink: 0 }}>
        <div style={{ display: "inline-block", fontSize: 10.5, letterSpacing: ".14em", textTransform: "uppercase", color: C.amber, fontFamily: sans, fontWeight: 700, background: C.amberSub, padding: "4px 14px", borderRadius: 20, marginBottom: 12 }}>ABP/SIMPL Assessment Platform</div>
        <h1 style={{ fontFamily: serif, fontSize: 26, fontWeight: 800, color: C.text, margin: "0 0 8px", lineHeight: 1.2 }}>Your Assessment Dashboard Guide</h1>
