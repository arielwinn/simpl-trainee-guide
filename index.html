<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABP/SIMPL | Resident Guide to Assessment and Practice Readiness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
button{font-family:inherit}
@keyframes chatPulse{0%,100%{box-shadow:0 4px 24px rgba(154,123,44,.4)}50%{box-shadow:0 4px 32px rgba(154,123,44,.65), 0 0 0 8px rgba(154,123,44,.12)}}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

const C = {
  bg: "#FAFAF8", surface: "#FFFFFF", tint: "#F7F5F0", amber: "#9A7B2C",
  amberSub: "#FFF7E3", text: "#2D3039", text2: "#5A5E6B", border: "#E4E3DE",
  accent: "#C9A23D", green: "#2D6A4F", greenSub: "#E8F5E9",
};
const serif = "'Source Serif 4', Georgia, serif";
const sans = "'Source Sans 3', 'Segoe UI', sans-serif";
const ps = { fontFamily: sans, fontSize: 14.5, lineHeight: 1.75, color: C.text, margin: "0 0 14px" };

const TABS = [
  { id: "why", label: "The Why", icon: "🎯" },
  { id: "tool", label: "The Platform", icon: "📱" },
  { id: "dashboard", label: "Your Dashboard & Data", icon: "📊" },
  { id: "data-use", label: "How Data Is Used", icon: "🔍" },
  { id: "challenges", label: "Honest Challenges", icon: "💡" },
];

const EPAS = [
  { n: 1, short: "Preventive Primary Care", desc: "Well-child visits across all ages — anticipatory guidance, screening, immunizations, developmental surveillance.", forms: "Well Child Visit (Primary Care)" },
  { n: 2, short: "Complex/Chronic Care", desc: "Ongoing management of children with conditions requiring coordinated, longitudinal care.", forms: "Complex/Chronic Care Visit, Follow-Up Visit (Primary Care)" },
  { n: 3, short: "Common Acute Diagnoses", desc: "Evaluating and treating acute illness presentations across settings — the most commonly assessed EPA.", forms: "Acute Common Problem (ED, Primary Care, Inpatient)" },
  { n: 4, short: "Behavior & Mental Health", desc: "Recognizing and initiating management for ADHD, anxiety, depression, and behavioral concerns.", forms: "Behavior/Mental Health Problem (ED, Primary Care)" },
  { n: 5, short: "Newborn Care", desc: "Newborn assessment, management, and family education from birth through discharge.", forms: "Newborn Care, Delivery Room Care (Nursery, NICU)" },
  { n: 6, short: "Subspecialty Referral", desc: "Identifying when a child needs subspecialty input, initiating workup, and communicating with consultants.", forms: "Consult a Subspecialist/Surgeon (ED, Inpatient, NICU/PICU)" },
  { n: 7, short: "Severely Ill Patient", desc: "Recognizing the acutely decompensating child, initiating stabilization, and arranging disposition. Not ICU management — recognizing sick and acting.", forms: "Immediate Intervention (ED), Decompensating Patient (NICU/PICU), Acute Care Transfer (Primary Care)" },
  { n: 8, short: "Clinical Handovers", desc: "Safe, effective transitions of care — admissions, discharges, transfers, shift changes.", forms: "Handover (ED, Inpatient, NICU/PICU)" },
  { n: 9, short: "Procedures", desc: "Procedures a general pediatrician would perform in practice — not subspecialty procedures.", forms: "Procedure (ED, Inpatient, NICU/PICU, Primary Care)" },
  { n: 10, short: "Interprofessional Teams", desc: "Working with nurses, social workers, therapists, and other team members to coordinate family-centered care.", forms: "Lead a Team / Supervise Others (ED, Inpatient, NICU/PICU)" },
  { n: 11, short: "Health Equity", desc: "Recognizing and addressing how racism and structural factors affect individual patients and populations.", forms: "Promoting Health Equity (Narrative-Only), embedded in EPA assessments" },
  { n: 12, short: "Technology & Evidence", desc: "Using evidence, clinical decision tools, and technology effectively in practice.", forms: "Information Sources and Evidence (All Settings)" },
];

const SCALE = [
  { level: "1", title: "Supervisor Performed", color: "#E74C3C", summary: "Resident was an observer.", detail: "The supervisor performed the activity. You observed but were not yet ready to actively participate in leading the care." },
  { level: "2", title: "Supervisor Led Care", color: "#E67E22", summary: "Supervisor directed the majority of care.", detail: "Required supervising physician(s) to direct the majority of the care. The supervisor led and you assisted or performed portions under close direction." },
  { level: "3", title: "Supervisor & Resident Co-Led", color: "#F1C40F", summary: "Supervisor directed some aspects of care.", detail: "Required supervising physician(s) to direct some aspects of the care. You and your supervisor co-led, with the supervisor stepping in to guide specific elements." },
  { level: "4", title: "Resident Led, Minimal Supervision", color: "#27AE60", summary: "You directed care; only small adjustments needed.", detail: "Resident directed care, supervision only led to small adjustments. You led the encounter and the supervisor’s involvement was limited to minor refinements." },
  { level: "5", title: "Resident Led, No Supervision Needed", color: "#2D6A4F", summary: "Care would have been safe and effective without a supervisor.", detail: "May benefit from continued learning and growth; however, care would have been safe and effective without a supervisor. This does not mean you are done learning — it means for this encounter, you did not need someone overseeing the care." },
];

const CCC_SCALE = [
  { level: "1", title: "Observation Only", desc: "Supervisor performs. Trainee is not ready to actively participate." },
  { level: "2", title: "Performs with Supervisor Present", desc: "2A: Co-activity with supervisor. 2B: Supervisor in room, ready to step in." },
  { level: "3", title: "Performs with Supervisor Available", desc: "3A: Close support/oversight. 3B: Moderate support/oversight. Supervisor readily available but not always present." },
  { level: "4", title: "Limited Support & Oversight", desc: "Supervisor still required for safety but does not need to be readily available. NOT yet practice ready." },
  { level: "5", title: "Practice Ready", desc: "No supervisor required. Performs without supervision. Knows limits and seeks input when needed." },
];

function Exp({ title, children, open: defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const ref = useRef(null);
  const [h, setH] = useState(0);
  useEffect(() => { if (ref.current) setH(ref.current.scrollHeight); }, [open, children]);
  return (
    <div style={{ marginBottom: 8 }}>
      <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "flex-start", gap: 12, width: "100%", border: open ? "1px solid " + C.border : "1px solid transparent", background: open ? C.surface : "transparent", borderRadius: 10, padding: "13px 16px", cursor: "pointer", textAlign: "left", transition: "all .2s" }}
        onMouseEnter={e => { if (!open) { e.currentTarget.style.background = C.tint; e.currentTarget.style.borderColor = C.border; } }}
        onMouseLeave={e => { if (!open) { e.currentTarget.style.background = "transparent"; e.currentTarget.style.borderColor = "transparent"; } }}>
        <span style={{ color: C.amber, fontSize: 13, fontWeight: 700, flexShrink: 0, marginTop: 3, transition: "transform .2s", transform: open ? "rotate(90deg)" : "rotate(0)", display: "inline-block" }}>{"▸"}</span>
        <span style={{ fontFamily: serif, fontSize: 15.5, fontWeight: 700, color: C.text, lineHeight: 1.45 }}>{title}</span>
      </button>
      <div style={{ maxHeight: open ? h + 20 : 0, overflow: "hidden", transition: "max-height .35s ease" }}>
        <div ref={ref} style={{ padding: "2px 16px 12px 44px", color: C.text2, fontFamily: sans, fontSize: 14.5, lineHeight: 1.72 }}>{children}</div>
      </div>
    </div>
  );
}

function Callout({ children, type = "amber" }) {
  return <div style={{ background: type === "green" ? C.greenSub : C.amberSub, borderLeft: "3px solid " + (type === "green" ? C.green : C.amber), borderRadius: "0 10px 10px 0", padding: "14px 18px", margin: "16px 0", fontFamily: serif, fontSize: 15, fontWeight: 600, color: C.text, lineHeight: 1.5 }}>{children}</div>;
}

function Tip({ children, def }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline" }}>
      <span onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)} onClick={() => setShow(!show)}
        style={{ color: C.amber, fontWeight: 600, borderBottom: "1.5px dotted " + C.accent, cursor: "help" }}>{children}</span>
      {show && <span style={{ position: "absolute", bottom: "calc(100% + 10px)", left: "50%", transform: "translateX(-50%)", background: C.text, color: "#F0F0EE", padding: "11px 15px", borderRadius: 10, fontSize: 13, lineHeight: 1.55, width: 280, zIndex: 100, boxShadow: "0 8px 30px rgba(0,0,0,.15)", fontFamily: sans, fontWeight: 400 }}>
        {def}<span style={{ position: "absolute", top: "100%", left: "50%", transform: "translateX(-50%)", borderLeft: "7px solid transparent", borderRight: "7px solid transparent", borderTop: "7px solid " + C.text }} />
      </span>}
    </span>
  );
}

function ExBox({ children }) {
  return <div style={{ background: C.tint, borderRadius: 10, padding: "14px 16px", border: "1px solid " + C.border, fontSize: 14, lineHeight: 1.65, color: C.text2, margin: "12px 0" }}>
    <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: ".12em", color: C.amber, fontWeight: 700, marginBottom: 6, fontFamily: sans }}>Example</div>
    {children}
  </div>;
}

function SH({ title, sub }) {
  return <>
    <h2 style={{ fontFamily: serif, fontSize: 24, fontWeight: 700, color: C.text, margin: "0 0 5px", lineHeight: 1.3 }}>{title}</h2>
    <div style={{ fontFamily: sans, fontSize: 13, color: C.amber, fontWeight: 600, letterSpacing: ".02em", marginBottom: 20 }}>{sub}</div>
  </>;
}

function H3({ children }) { return <h3 style={{ fontFamily: serif, fontSize: 18, fontWeight: 700, color: C.text, margin: "28px 0 12px" }}>{children}</h3>; }
function Div() { return <div style={{ height: 1, background: C.border, margin: "32px 0" }} />; }

/* ===== TAB CONTENT COMPONENTS ===== */

function TabWhy() {
  const [selEpa, setSelEpa] = useState(null);
  return <>
    <SH title="Why This System Exists" sub="The Goals Behind the Change" />
    <p style={ps}>This assessment system was not created to add more tasks to your day. It was created because the old approach to evaluating residents was not good enough to serve patients, to serve you, or to serve the profession. This system is built around five goals:</p>

    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, margin: "8px 0 6px" }}>
      {[
        { icon: "❤️", t: "Center patients", d: "Ensure graduates can meet the needs of the children they serve" },
        { icon: "🎓", t: "Center learners", d: "Give you transparency, agency, and feedback that drives growth" },
        { icon: "📈", t: "Improve the data", d: "Replace gestalt impressions with frequent, specific, observed evidence" },
      ].map((g, i) => (
        <div key={i} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 22, marginBottom: 6 }}>{g.icon}</div>
          <div style={{ fontFamily: serif, fontSize: 13.5, fontWeight: 700, color: C.text, marginBottom: 4, lineHeight: 1.3 }}>{g.t}</div>
          <div style={{ fontFamily: sans, fontSize: 11.5, color: C.text2, lineHeight: 1.5 }}>{g.d}</div>
        </div>
      ))}
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 10, margin: "0 0 24px" }}>
      {[
        { icon: "⚖️", t: "Improve equity", d: "Build structures that promote fairness and mitigate bias" },
        { icon: "🔄", t: "Assessment & growth", d: "One system that serves both learning and high-stakes decisions" },
      ].map((g, i) => (
        <div key={i} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 12, padding: "14px 12px", textAlign: "center" }}>
          <div style={{ fontSize: 22, marginBottom: 6 }}>{g.icon}</div>
          <div style={{ fontFamily: serif, fontSize: 13.5, fontWeight: 700, color: C.text, marginBottom: 4, lineHeight: 1.3 }}>{g.t}</div>
          <div style={{ fontFamily: sans, fontSize: 11.5, color: C.text2, lineHeight: 1.5 }}>{g.d}</div>
        </div>
      ))}
    </div>

    <H3>What Are EPAs?</H3>
    <p style={ps}>Traditional assessment systems evaluate residents on broad domains of competence like "medical knowledge" or "professionalism." These are important, but they do not directly answer the question that matters most: can this person actually do the work of a pediatrician?</p>
    <p style={ps}><Tip def="Entrustable Professional Activities are the essential tasks that define what a pediatrician does. Each represents a unit of clinical work that can be observed, assessed, and — when a trainee is ready — entrusted to them without supervision.">Entrustable Professional Activities (EPAs)</Tip> were created to answer that question. Each EPA defines an essential activity of practice — something a general pediatrician actually does — that can be directly observed, assessed, and ultimately entrusted to you. Instead of asking "does this resident have enough medical knowledge?", the system asks "can this resident manage an acutely ill child?" or "can this resident provide a well-child visit?" The 12 General Pediatrics EPAs together define the scope of what it means to practice as a general pediatrician. Tap any below to learn more.</p>

    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 10, margin: "12px 0 20px" }}>
      {EPAS.map(e => (
        <button key={e.n} onClick={() => setSelEpa(selEpa === e.n ? null : e.n)}
          style={{ background: selEpa === e.n ? C.amberSub : C.surface, border: "1px solid " + (selEpa === e.n ? C.amber : C.border), borderRadius: 10, padding: "12px 14px", cursor: "pointer", textAlign: "left", transition: "all .15s" }}>
          <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, color: C.amber, marginBottom: 4 }}>EPA {e.n}</div>
          <div style={{ fontFamily: serif, fontSize: 13.5, fontWeight: 600, color: C.text, lineHeight: 1.35 }}>{e.short}</div>
        </button>
      ))}
    </div>
    {selEpa && (() => { const e = EPAS.find(x => x.n === selEpa); return (
      <div style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 12, padding: "18px 20px", marginBottom: 16 }}>
        <div style={{ fontFamily: sans, fontSize: 11, fontWeight: 700, color: C.amber, marginBottom: 4 }}>EPA {e.n}</div>
        <div style={{ fontFamily: serif, fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 8 }}>{e.short}</div>
        <p style={{ fontFamily: sans, fontSize: 14, color: C.text2, lineHeight: 1.6, margin: "0 0 10px" }}>{e.desc}</p>
        <div style={{ fontFamily: sans, fontSize: 12.5, color: C.amber, fontWeight: 600 }}>Forms: <span style={{ fontWeight: 400, color: C.text2 }}>{e.forms}</span></div>
      </div>
    ); })()}
    <p style={{ ...ps, fontSize: 13, color: C.text2, fontStyle: "italic" }}>On the app, forms use plain clinical titles. You will not see "EPA 3" — you will see "Acute Common Problem." Your dashboard rolls data up by EPA.</p>

    <Div />

    <H3>What Does Practice Ready Mean?</H3>
    <Callout>The required outcome of training for graduation and to be eligible to become board certified is to be practice ready across all of the General Pediatrics EPAs.</Callout>
    <p style={ps}>A <strong>practice ready</strong> trainee can provide safe and effective care without assigned supervision in the context of a post-training collaborative practice environment in the discipline in which they have been trained.</p>
    <p style={ps}><strong>Safe and effective, not expert.</strong> The bar is foundational capability, not mastery. Every practicing pediatrician has areas for continued growth.</p>
    <p style={ps}><strong>Without assigned supervision, not without support.</strong> Pediatrics is inherently collaborative. No one needs to be assigned to oversee your work {"—"} but you still consult colleagues, use resources, and work within teams. Think of getting a driver's license: you can drive without someone in the passenger seat, but you still use GPS and call for directions.</p>
    <p style={ps}><strong>Based on your training discipline, not your next job.</strong> The standard does not change based on fellowship plans. Plans change, environments change, foundational skills do not.</p>
    <p style={ps}><strong>A foundation, not a ceiling.</strong> You are not expected to be practice ready on day one. Many of you will advance well beyond this threshold, pursuing goals in research, advocacy, QI, fellowship prep, or other areas.</p>

    <Div />

    <H3>The 2028 Certification Changes</H3>
    <p style={ps}>Beginning in 2028, the ABP will require program directors to attest that graduates are practice ready across all EPAs of their discipline as a prerequisite for initial certification. This means your CCC will need to determine you have reached Level 5 (practice ready) for each EPA before your program director can attest to the ABP.</p>
    <p style={ps}>This replaces the current system where programs attest that graduates are "satisfactory" across general competency domains. It is not about raising the bar — it is about being transparent and evidence-informed about a bar that has always existed: graduates should be able to meet their patients' needs in practice.</p>
    <Exp title="Why does this matter right now?">
      <p style={{ margin: 0 }}>For current interns, these changes apply directly to your graduation. For all trainees, the system you are using now — the assessments, the dashboards, the CCC process — is building toward this. Current EPA assignments are developmental and carry no stakes. They are intended to provide you with data to support your growth and to give your program more specific information to make decisions about your progress toward becoming practice ready — which will become consequential in 2028.</p>
    </Exp>
  </>;
}

function TabTool() {
  const [selLevel, setSelLevel] = useState(null);
  return <>
    <SH title="The ABP/SIMPL Platform" sub="How Assessment Data Is Collected" />

    <H3>A Different Approach to Assessment</H3>
    <p style={ps}>You may be familiar with end-of-rotation evaluations: a faculty member completes a form days or weeks after a rotation ends, summarizing their overall impressions of your performance across the entire block. These evaluations are often based on general recall rather than specific observed encounters, and they tend to produce vague feedback ("good fund of knowledge," "works well with the team") that is difficult to act on.</p>
    <p style={ps}>The ABP/SIMPL platform takes a fundamentally different approach called <Tip def="Assessment tied to specific clinical encounters in real practice environments, completed close to the time of the encounter. Captures what actually happened rather than general impressions recalled later.">workplace-based assessment (WBA)</Tip>. Instead of one summary at the end of a rotation, faculty complete brief assessments tied to specific clinical encounters, close to the time they happen. Each assessment captures what you actually did, in a real clinical situation, as observed by the supervisor who was there. This produces feedback that is specific, timely, and actionable — and generates data that accumulates into a much richer picture of your development.</p>

    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, margin: "16px 0 24px" }}>
      {[{ t: "End-of-Rotation", items: ["One form per rotation", "Completed days/weeks later", "Based on general impressions", "Vague, hard to act on", "~10 per resident per year"], bad: true },
        { t: "Workplace-Based (SIMPL)", items: ["Many forms per rotation", "Completed within 4 days", "Tied to specific encounters", "Specific, actionable feedback", "Many more data points per year"], bad: false }
      ].map((col, i) => (
        <div key={i} style={{ flex: 1, background: col.bad ? C.tint : C.amberSub, border: "1px solid " + C.border, borderRadius: 12, padding: "16px 14px" }}>
          <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 14, color: C.text, marginBottom: 10 }}>{col.t}</div>
          {col.items.map((item, j) => <div key={j} style={{ fontFamily: sans, fontSize: 13, color: C.text2, lineHeight: 1.6, paddingLeft: 12, position: "relative", marginBottom: 4 }}><span style={{ position: "absolute", left: 0 }}>{col.bad ? "–" : "✓"}</span>{item}</div>)}
        </div>
      ))}
    </div>

    <H3>Three Types of Forms</H3>
    <p style={ps}>The platform collects data through three complementary assessment types, each capturing different information:</p>

    <Exp title="1. EPA-Based Forms" open={true}>
      <p style={{ margin: "0 0 8px" }}>The core of the platform. Each form maps to one of the 12 General Pediatrics EPAs and includes a supervision rating, required narrative comments (often dictated via voice-to-text), and clinical context. Forms take 1-3 minutes. The forms available change by clinical setting — "Acute Common Problem" appears in the ED but not the NICU, because managing an acute common problem in the NICU falls outside general pediatrics scope.</p>
      <p style={{ margin: 0, fontStyle: "italic", fontSize: 13 }}>Form titles use plain clinical language, not formal EPA names. This was intentional: intuitive titles lower barriers and help assessors focus on the encounter.</p>
    </Exp>
    <Exp title="2. Narrative-Only Forms (KSAs)">
      <p style={{ margin: 0 }}>These forms collect only written feedback (no supervision rating) on cross-cutting knowledge, skills, and abilities essential to all EPAs: knowing limits and seeking help, communicating with patients and families, collaborating with others, professional behaviors, high-value care, promoting health equity, and learning and growth behaviors. These skills cut across everything you do and are critical to entrustment decisions, but may not be fully captured in a single EPA encounter.</p>
    </Exp>
    <Exp title="3. Longitudinal Continuity Clinic Assessment">
      <p style={{ margin: 0 }}>Completed by your continuity clinic preceptor based on observations over multiple encounters rather than a single visit. This form captures your development in the primary care setting longitudinally. Because your preceptor observes you in the general pediatrics practice environment over time, they bring an inherent understanding of what is expected of a general pediatrician in practice, making this data particularly valuable for CCC decisions.</p>
    </Exp>

    <Div />

    <H3>The SIMPL Supervision Scale</H3>
    <p style={ps}>Each EPA-based assessment includes a rating on the SIMPL Retrospective Supervision Scale. The question: <em>How much supervision did the resident need when performing this activity?</em> Importantly, this refers to supervision from any supervisor involved in the encounter — not just the person completing the form. In team-based care, fellows, senior residents, and other faculty may all contribute to supervision, and the rating is meant to capture the total picture. Tap a level to learn more.</p>
    <div style={{ display: "flex", flexDirection: "column", gap: 6, margin: "0 0 8px" }}>
      {SCALE.map(s => (
        <button key={s.level} onClick={() => setSelLevel(selLevel === s.level ? null : s.level)}
          style={{ display: "flex", alignItems: "center", gap: 12, background: selLevel === s.level ? C.surface : "transparent", border: selLevel === s.level ? "1px solid " + C.border : "1px solid transparent", borderRadius: 10, padding: "10px 14px", cursor: "pointer", textAlign: "left", transition: "all .15s", width: "100%" }}
          onMouseEnter={e => { if (selLevel !== s.level) e.currentTarget.style.background = C.tint; }}
          onMouseLeave={e => { if (selLevel !== s.level) e.currentTarget.style.background = "transparent"; }}>
          <div style={{ width: 36, height: 36, borderRadius: 8, background: s.color + "18", color: s.color, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: 700, fontSize: 15, flexShrink: 0 }}>{s.level}</div>
          <div>
            <div style={{ fontFamily: serif, fontSize: 14, fontWeight: 700, color: C.text }}>{s.title}</div>
            <div style={{ fontFamily: sans, fontSize: 12.5, color: C.text2 }}>{s.summary}</div>
          </div>
        </button>
      ))}
    </div>
    {selLevel && (() => { const s = SCALE.find(x => x.level === selLevel); return (
      <div style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 10, padding: "14px 16px", margin: "8px 0 16px", fontFamily: sans, fontSize: 14, lineHeight: 1.65, color: C.text2 }}>
        <span style={{ fontWeight: 700, color: s.color }}>Level {s.level}:</span> {s.detail}
      </div>
    ); })()}
    <p style={{ fontFamily: sans, fontSize: 13, color: C.text2, fontStyle: "italic", margin: "8px 0 0", lineHeight: 1.6 }}>Each rating is retrospective: how much supervision was needed for this encounter, not how much was delivered, and not what you would need in future practice.</p>

    <Div />

    <H3>Why It Works the Way It Does: Multi-Stakeholder Tradeoffs</H3>
    <p style={ps}>This platform serves three audiences at once: you as the learner receiving feedback, faculty completing assessments in busy clinical environments, and CCCs making high-stakes decisions about your readiness. If we designed the perfect system for any one of these groups, it would probably break for the others. Every design choice is a tradeoff between these competing needs. Understanding that helps explain decisions that might otherwise seem puzzling.</p>

    <Exp title="Why narrative is required even though faculty find it burdensome" open={true}>
      <p style={{ margin: 0 }}>Narrative comments are the single biggest driver of resident engagement and the most valuable data for CCC decisions. Faculty preferred multiple-choice for speed. We made narrative required anyway — with voice-to-text and just-in-time teaching prompts to reduce the burden. Reinforcing and constructive feedback share one text box (easier for faculty to complete, though less ideal for CCCs who benefit from distinguishing the two). This tradeoff prioritizes your learning and the quality of CCC data over assessor convenience.</p>
    </Exp>
    <Exp title="Why one scale across all EPAs instead of tailored scales">
      <p style={{ margin: 0 }}>A scale tailored to each EPA would capture more nuance — better for CCCs. But asking faculty to learn and apply different scales across different activities would make the system harder to use and less likely to be completed — worse for faculty and ultimately for you. One scale focused on who led the care is simpler for everyone, easier to aggregate across settings, and still meaningful for decisions.</p>
    </Exp>
    <Exp title="Why the scale asks about supervision needed, not provided">
      <p style={{ margin: 0 }}>Supervision is baked into training. A supervisor might provide more oversight than you strictly needed — regulatory requirements, teaching opportunities, their relationship with a patient. Asking about what was needed rather than what was delivered gets at what actually matters: your readiness. This is harder for faculty (it requires judgment rather than just reporting what happened), but it produces more useful data for you and your CCC.</p>
    </Exp>
    <Exp title="Why forms are standardized but implementation is flexible">
      <p style={{ margin: 0 }}>Standardizing form content ensures every program's data is aligned with the same framework and can be aggregated for learning across programs. But programs vary enormously in size, structure, and culture, so implementation (who initiates forms, frequency expectations, rollout approach) is flexible. Standardized content protects you by ensuring what is assessed is evidence-informed and purpose-aligned. Flexible implementation protects programs by letting them adapt to local context.</p>
    </Exp>
    <Exp title="Why the scale is retrospective rather than prospective">
      <p style={{ margin: 0 }}>Ideally, an assessor would tell you what supervision you would need in future practice. That works in continuity clinic, where your preceptor knows the general pediatrics environment. But much of training happens on subspecialty rotations — a pediatric oncologist supervising you on the wards may struggle to project what you would need in a general pediatrics office. A retrospective question ("how much supervision did you need during this encounter?") is easier for faculty across all settings. Your CCC then translates the aggregate data into prospective judgments about readiness — a task better suited to a committee reviewing the full picture than to a single assessor in the moment.</p>
    </Exp>
  </>;
}

const GREETING = "Hi! I can help you navigate this guide. Tap any question below, or type your own.";
const DISCLAIMER = "I'm still learning, so please don't trust my output completely — always check the relevant section of the guide to confirm.";

function Chatbot({ onNavigate }) {
  const [open, setOpen] = useState(true);
  const [messages, setMessages] = useState([{ from: "bot", text: GREETING, disclaimer: false }]);
  const [input, setInput] = useState("");
  const [showFAQ, setShowFAQ] = useState(true);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth" });
  }, [messages]);

  useEffect(() => {
    if (open && inputRef.current) inputRef.current.focus();
  }, [open]);

  const answerFAQ = useCallback((faq) => {
    const userMsg = { from: "user", text: faq.q };
    const tabLabel = faq.tab ? TABS.find(t => t.id === faq.tab) : null;
    const botMsg = { from: "bot", text: faq.short, tab: faq.tab, tabLabel: tabLabel ? tabLabel.label : null, disclaimer: true, showMore: true };
    setMessages(prev => [...prev, userMsg, botMsg]);
    setShowFAQ(false);
    setInput("");
  }, []);

  const handleFreeText = useCallback((q) => {
    if (!q.trim()) return;
    const lower = q.trim().toLowerCase().replace(/[?!.,'"]/g, "");
    // Try to find a close match among FAQ questions
    let best = null, bestScore = 0;
    for (const faq of FAQ) {
      const faqLower = faq.q.toLowerCase().replace(/[?!.,'"]/g, "");
      // Exact match
      if (lower === faqLower) { best = faq; break; }
      // Check how many words from the user's input appear in the FAQ question
      const userWords = lower.split(/\s+/).filter(w => w.length > 2);
      const faqWords = faqLower.split(/\s+/);
      let matches = 0;
      for (const uw of userWords) {
        if (faqWords.some(fw => fw.includes(uw) || uw.includes(fw))) matches++;
      }
      const score = userWords.length > 0 ? matches / userWords.length : 0;
      if (score > bestScore && score >= 0.5) { bestScore = score; best = faq; }
    }
    if (best) {
      answerFAQ(best);
    } else {
      const userMsg = { from: "user", text: q.trim() };
      const botMsg = { from: "bot", text: "I don't have a specific answer for that, but one of these questions might help:", disclaimer: true, showFAQInline: true };
      setMessages(prev => [...prev, userMsg, botMsg]);
      setShowFAQ(false);
      setInput("");
    }
  }, [answerFAQ]);

  const chatBtnStyle = {
    position: "fixed", bottom: 20, right: 20, borderRadius: 30,
    background: C.amber, color: "#fff", border: "none", cursor: "pointer",
    boxShadow: "0 4px 24px rgba(154,123,44,.4)", zIndex: 1000, display: "flex", alignItems: "center",
    justifyContent: "center", gap: 8, transition: "transform .2s",
    padding: open ? "0" : "14px 22px 14px 18px", width: open ? 56 : "auto", height: open ? 56 : "auto",
    animation: open ? "none" : "chatPulse 2.5s ease-in-out infinite",
  };
  const panelStyle = {
    position: "fixed", bottom: 88, right: 20, width: 420, maxWidth: "calc(100vw - 40px)",
    maxHeight: "min(560px, calc(100vh - 120px))", borderRadius: 16, background: C.surface,
    border: "1px solid " + C.border, boxShadow: "0 12px 40px rgba(0,0,0,.15)", zIndex: 1000,
    display: "flex", flexDirection: "column", overflow: "hidden",
  };
  const faqBtnStyle = {
    background: C.amberSub, border: "1px solid " + C.border, borderRadius: 10, padding: "8px 12px",
    fontFamily: sans, fontSize: 12, color: C.amber, fontWeight: 600, cursor: "pointer",
    textAlign: "left", lineHeight: 1.4, width: "100%",
  };

  return <>
    {open && <div style={panelStyle}>
      <div style={{ padding: "14px 16px", borderBottom: "1px solid " + C.border, display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 28, height: 28, borderRadius: 14, background: C.amberSub, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>{"💬"}</div>
        <div style={{ flex: 1 }}>
          <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 14, color: C.text }}>Guide Assistant</div>
          <div style={{ fontFamily: sans, fontSize: 10.5, color: C.text2 }}>Tap a question or type your own</div>
        </div>
        <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: C.text2, padding: 4 }}>{"✕"}</button>
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: "12px 16px", display: "flex", flexDirection: "column", gap: 10 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ alignSelf: m.from === "user" ? "flex-end" : "flex-start", maxWidth: "85%" }}>
            <div style={{
              background: m.from === "user" ? C.amber : C.tint, color: m.from === "user" ? "#fff" : C.text,
              padding: "10px 14px", borderRadius: m.from === "user" ? "14px 14px 4px 14px" : "14px 14px 14px 4px",
              fontFamily: sans, fontSize: 13, lineHeight: 1.55,
            }}>
              {m.text}
              {m.tab && <button onClick={() => { onNavigate(m.tab); }} style={{
                display: "block", marginTop: 8, background: C.amberSub, border: "1px solid " + C.accent,
                borderRadius: 8, padding: "6px 12px", cursor: "pointer", fontFamily: sans, fontSize: 12,
                fontWeight: 600, color: C.amber,
              }}>{"Read more: " + m.tabLabel + " →"}</button>}
              {m.showFAQInline && <div style={{ display: "flex", flexDirection: "column", gap: 4, marginTop: 8 }}>
                {FAQ.slice(0, 6).map((faq, j) => (
                  <button key={j} onClick={() => answerFAQ(faq)} style={{
                    background: "#fff", border: "1px solid " + C.border, borderRadius: 8, padding: "6px 10px",
                    fontFamily: sans, fontSize: 11.5, color: C.amber, fontWeight: 600, cursor: "pointer", textAlign: "left",
                  }}>{faq.q}</button>
                ))}
              </div>}
            </div>
            {m.disclaimer && <div style={{ fontFamily: sans, fontSize: 10.5, color: C.text2, marginTop: 4, fontStyle: "italic", paddingLeft: 4 }}>{DISCLAIMER}</div>}
          </div>
        ))}
        {showFAQ && <div style={{ display: "flex", flexDirection: "column", gap: 5, marginTop: 4 }}>
          {FAQ.map((faq, i) => (
            <button key={i} onClick={() => answerFAQ(faq)} style={faqBtnStyle}>{faq.q}</button>
          ))}
        </div>}
        <div ref={bottomRef} />
      </div>
      <div style={{ padding: "10px 12px", borderTop: "1px solid " + C.border, display: "flex", gap: 8 }}>
        <input ref={inputRef} value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") handleFreeText(input); }}
          placeholder="Type a question..."
          style={{ flex: 1, border: "1px solid " + C.border, borderRadius: 10, padding: "9px 14px", fontFamily: sans, fontSize: 13, outline: "none", background: C.tint }} />
        <button onClick={() => handleFreeText(input)} style={{
          background: C.amber, color: "#fff", border: "none", borderRadius: 10, padding: "0 16px",
          cursor: "pointer", fontFamily: sans, fontWeight: 600, fontSize: 13,
        }}>Send</button>
      </div>
    </div>}
    <button onClick={() => setOpen(!open)} style={chatBtnStyle}
      onMouseEnter={e => e.currentTarget.style.transform = "scale(1.05)"}
      onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}>
      {open ? <span style={{ fontSize: 24 }}>{"✕"}</span> : <>
        <span style={{ fontSize: 22 }}>{"💬"}</span>
        <span style={{ fontFamily: sans, fontWeight: 700, fontSize: 14, letterSpacing: ".01em" }}>Ask a Question</span>
      </>}
    </button>
  </>;
}
