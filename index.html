<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABP/SIMPL | Your Assessment Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Serif+4:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;background:#FAFAF8}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const C = {
  bg: "#FAFAF8", surface: "#FFFFFF", tint: "#F7F5F0", amber: "#9A7B2C",
  amberSub: "#FFF7E3", text: "#2D3039", text2: "#5A5E6B", border: "#E4E3DE",
  accent: "#C9A23D", green: "#2D6A4F", greenSub: "#E8F5E9",
};
const serif = "'Source Serif 4', Georgia, serif";
const sans = "'Source Sans 3', 'Segoe UI', sans-serif";

const SCALE = [
  { level: "1", title: "Supervisor Performed", color: "#E74C3C", short: "You observed", detail: "The supervisor performed the activity. You observed but were not yet ready to actively participate in leading the care." },
  { level: "2", title: "Supervisor Led", color: "#E67E22", short: "Supervisor directed most care", detail: "Required supervising physician(s) to direct the majority of the care. The supervisor led and you assisted or performed portions under close direction." },
  { level: "3", title: "Co-Led", color: "#F1C40F", short: "You and supervisor co-led", detail: "Required supervising physician(s) to direct some aspects of the care. You and your supervisor co-led, with the supervisor stepping in to guide specific elements." },
  { level: "4", title: "You Led", color: "#27AE60", short: "Only small adjustments needed", detail: "Resident directed care, supervision only led to small adjustments. You led the encounter and the supervisor's involvement was limited to minor refinements." },
  { level: "5", title: "Independent", color: "#2D6A4F", short: "Safe without a supervisor", detail: "Care would have been safe and effective without a supervisor. This does not mean you are done learning \u2014 it means for this encounter, you did not need someone overseeing the care." },
];

const CCC_SCALE = [
  { level: "1", title: "Observation Only", desc: "Supervisor performs. Trainee is not ready to actively participate." },
  { level: "2", title: "Supervisor Present", desc: "2A: Co-activity with supervisor. 2B: Supervisor in room, ready to step in." },
  { level: "3", title: "Supervisor Available", desc: "3A: Close support/oversight. 3B: Moderate. Supervisor readily available but not always present." },
  { level: "4", title: "Limited Oversight", desc: "Supervisor still required for safety but does not need to be readily available. NOT yet practice ready." },
  { level: "5", title: "Practice Ready", desc: "No supervisor required. Performs without supervision. Knows limits and seeks input when needed." },
];

/* ===== COMPONENTS ===== */

function Exp({ title, children, open: defaultOpen = false }) {
  const [open, setOpen] = useState(defaultOpen);
  const ref = useRef(null);
  const [h, setH] = useState(0);
  useEffect(() => { if (ref.current) setH(ref.current.scrollHeight); }, [open, children]);
  return (
    <div style={{ marginBottom: 6 }}>
      <button onClick={() => setOpen(!open)} style={{ display: "flex", alignItems: "flex-start", gap: 12, width: "100%", border: "1px solid " + (open ? C.border : "transparent"), background: open ? C.surface : "transparent", borderRadius: 10, padding: "13px 16px", cursor: "pointer", textAlign: "left", transition: "all .2s" }}
        onMouseEnter={e => { if (!open) { e.currentTarget.style.background = C.tint; e.currentTarget.style.borderColor = C.border; } }}
        onMouseLeave={e => { if (!open) { e.currentTarget.style.background = open ? C.surface : "transparent"; e.currentTarget.style.borderColor = open ? C.border : "transparent"; } }}>
        <span style={{ color: C.amber, fontSize: 13, fontWeight: 700, flexShrink: 0, marginTop: 4, transition: "transform .2s", transform: open ? "rotate(90deg)" : "rotate(0)", display: "inline-block" }}>{"\u25B8"}</span>
        <span style={{ fontFamily: serif, fontSize: 16.5, fontWeight: 700, color: C.text, lineHeight: 1.45 }}>{title}</span>
      </button>
      <div style={{ maxHeight: open ? h + 20 : 0, overflow: "hidden", transition: "max-height .4s ease" }}>
        <div ref={ref} style={{ padding: "4px 16px 14px 46px", color: C.text2, fontFamily: sans, fontSize: 16, lineHeight: 1.78 }}>{children}</div>
      </div>
    </div>
  );
}

function Tip({ children, def }) {
  const [show, setShow] = useState(false);
  return (
    <span style={{ position: "relative", display: "inline" }}>
      <span onMouseEnter={() => setShow(true)} onMouseLeave={() => setShow(false)} onClick={() => setShow(!show)}
        style={{ color: C.amber, fontWeight: 600, borderBottom: "1.5px dotted " + C.accent, cursor: "help" }}>{children}</span>
      {show && <span style={{ position: "absolute", bottom: "calc(100% + 10px)", left: "50%", transform: "translateX(-50%)", background: C.text, color: "#F0F0EE", padding: "12px 16px", borderRadius: 10, fontSize: 14, lineHeight: 1.55, width: 310, zIndex: 100, boxShadow: "0 8px 30px rgba(0,0,0,.15)", fontFamily: sans, fontWeight: 400 }}>
        {def}<span style={{ position: "absolute", top: "100%", left: "50%", transform: "translateX(-50%)", borderLeft: "7px solid transparent", borderRight: "7px solid transparent", borderTop: "7px solid " + C.text }} />
      </span>}
    </span>
  );
}

function LinkBtn({ href, children }) {
  return <a href={href} target="_blank" rel="noopener noreferrer" style={{
    display: "inline-flex", alignItems: "center", gap: 7, background: C.amberSub, border: "1px solid " + C.accent,
    borderRadius: 8, padding: "10px 18px", fontFamily: sans, fontSize: 15, fontWeight: 600, color: C.amber,
    textDecoration: "none", margin: "4px 8px 4px 0", cursor: "pointer",
  }}>{children} <span style={{ fontSize: 12 }}>{"\u2197"}</span></a>;
}

function ExBox({ children }) {
  return <div style={{ background: C.tint, borderRadius: 10, padding: "16px 18px", border: "1px solid " + C.border, fontSize: 15.5, lineHeight: 1.7, color: C.text2, margin: "14px 0" }}>
    <div style={{ fontSize: 10.5, textTransform: "uppercase", letterSpacing: ".12em", color: C.amber, fontWeight: 700, marginBottom: 7, fontFamily: sans }}>Example</div>
    {children}
  </div>;
}

function Section({ id, children }) {
  return <section id={id} style={{ maxWidth: 960, margin: "0 auto", padding: "48px 32px" }}>{children}</section>;
}
function SectionDivider() {
  return <div style={{ maxWidth: 960, margin: "0 auto", padding: "0 32px" }}><div style={{ height: 1, background: C.border }} /></div>;
}
function H2({ children, sub }) {
  return <>
    <h2 style={{ fontFamily: serif, fontSize: 26, fontWeight: 700, color: C.text, margin: "0 0 " + (sub ? "6px" : "16px") }}>{children}</h2>
    {sub && <div style={{ fontFamily: sans, fontSize: 13.5, color: C.amber, fontWeight: 600, letterSpacing: ".02em", marginBottom: 20 }}>{sub}</div>}
  </>;
}
const P = ({ children, mb }) => <p style={{ fontFamily: sans, fontSize: 16.5, lineHeight: 1.8, color: C.text, margin: "0 0 " + (mb || 16) + "px" }}>{children}</p>;

/* ===== APP ===== */

function App() {
  const [selLevel, setSelLevel] = useState(null);
  const [activeNav, setActiveNav] = useState("top");

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) {
      const y = el.getBoundingClientRect().top + window.scrollY - 56;
      window.scrollTo({ top: y, behavior: "smooth" });
    }
  };

  useEffect(() => {
    const ids = ["top", "volume", "data", "ccc", "background"];
    const onScroll = () => {
      for (let i = ids.length - 1; i >= 0; i--) {
        const el = document.getElementById(ids[i]);
        if (el && el.getBoundingClientRect().top <= 80) { setActiveNav(ids[i]); return; }
      }
      setActiveNav("top");
    };
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  const navItems = [
    { id: "top", label: "Get Started" },
    { id: "volume", label: "Volume" },
    { id: "data", label: "Your Data" },
    { id: "ccc", label: "CCC & 2028" },
    { id: "background", label: "Background" },
  ];

  return (
    <div style={{ background: C.bg, minHeight: "100vh" }}>

      {/* HEADER */}
      <header id="top" style={{ background: C.surface, borderBottom: "1px solid " + C.border }}>
        <div style={{ maxWidth: 960, margin: "0 auto", padding: "48px 32px 20px", textAlign: "center" }}>
          <div style={{ display: "inline-block", fontSize: 11.5, letterSpacing: ".14em", textTransform: "uppercase", color: C.amber, fontFamily: sans, fontWeight: 700, background: C.amberSub, padding: "5px 16px", borderRadius: 20, marginBottom: 16 }}>ABP/SIMPL Assessment Platform</div>
          <h1 style={{ fontFamily: serif, fontSize: 36, fontWeight: 800, color: C.text, margin: "0 0 12px", lineHeight: 1.15 }}>You Have Access to Your Assessment Dashboard</h1>
          <p style={{ fontFamily: sans, fontSize: 18, color: C.text2, maxWidth: 600, margin: "0 auto 32px", lineHeight: 1.6 }}>Here's how to get started and what to know when using it.</p>

          {/* QUICK LINKS */}
          <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap", margin: "0 auto 16px" }}>
            <a href="#" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: C.amberSub, border: "1.5px solid " + C.accent, borderRadius: 10, padding: "12px 20px", textDecoration: "none", fontFamily: sans, fontSize: 15, fontWeight: 600, color: C.amber, transition: "transform .15s" }}
              onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
              onMouseLeave={e => e.currentTarget.style.transform = "none"}>
              {"\u{1F3AC}"} Watch the Video Walkthrough <span style={{ fontSize: 11, opacity: .6 }}>(coming soon)</span>
            </a>
            <a href="#" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: C.surface, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 20px", textDecoration: "none", fontFamily: sans, fontSize: 15, fontWeight: 600, color: C.text, transition: "transform .15s" }}
              onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
              onMouseLeave={e => e.currentTarget.style.transform = "none"}>
              {"\u{1F4CA}"} Open Your Dashboard <span style={{ fontSize: 11, opacity: .6 }}>(link coming)</span>
            </a>
            <a href="#" style={{ display: "inline-flex", alignItems: "center", gap: 8, background: C.surface, border: "1.5px solid " + C.border, borderRadius: 10, padding: "12px 20px", textDecoration: "none", fontFamily: sans, fontSize: 15, fontWeight: 600, color: C.text, transition: "transform .15s" }}
              onMouseEnter={e => e.currentTarget.style.transform = "translateY(-1px)"}
              onMouseLeave={e => e.currentTarget.style.transform = "none"}>
              {"\u{1F4DD}"} Submit an Assessment <span style={{ fontSize: 11, opacity: .6 }}>(link coming)</span>
            </a>
          </div>
        </div>
      </header>

      {/* STICKY NAV */}
      <nav style={{ background: C.surface, borderBottom: "1px solid " + C.border, position: "sticky", top: 0, zIndex: 50 }}>
        <div style={{ maxWidth: 960, margin: "0 auto", display: "flex", padding: "0 16px", overflowX: "auto" }}>
          {navItems.map(n => (
            <button key={n.id} onClick={() => scrollTo(n.id)} style={{
              border: "none", background: "transparent", padding: "13px 14px", cursor: "pointer",
              fontFamily: sans, fontSize: 13.5, fontWeight: activeNav === n.id ? 700 : 500,
              color: activeNav === n.id ? C.amber : C.text2,
              borderBottom: activeNav === n.id ? "2.5px solid " + C.amber : "2.5px solid transparent",
              transition: "all .15s", whiteSpace: "nowrap",
            }}>{n.label}</button>
          ))}
        </div>
      </nav>

      {/* ===== THREE PURPOSES OF YOUR DASHBOARD ===== */}
      <section style={{ maxWidth: 960, margin: "0 auto", padding: "44px 32px 20px" }}>
        <h2 style={{ fontFamily: serif, fontSize: 26, fontWeight: 700, color: C.text, margin: "0 0 6px" }}>What Your Dashboard Does</h2>
        <div style={{ fontFamily: sans, fontSize: 13.5, color: C.amber, fontWeight: 600, letterSpacing: ".02em", marginBottom: 20 }}>Three purposes, one tool</div>

        <P mb={24}>Your dashboard makes you a partner in tracking your own growth. It serves three purposes:</P>

        <div style={{ display: "grid", gap: 16, margin: "0 0 28px" }}>
          {/* PURPOSE 1 */}
          <div onClick={() => scrollTo("volume")} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 14, padding: "24px 24px", cursor: "pointer", transition: "border-color .15s, box-shadow .15s", display: "grid", gridTemplateColumns: "56px 1fr", gap: 18, alignItems: "start" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.boxShadow = "0 4px 16px rgba(154,123,44,.08)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "none"; }}>
            <div style={{ width: 56, height: 56, borderRadius: 14, background: C.amberSub, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{"\u{1F4CA}"}</div>
            <div>
              <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.amber, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Purpose 1</div>
              <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 700, color: C.text, marginBottom: 8, lineHeight: 1.3 }}>Track your assessment volume</div>
              <div style={{ fontFamily: sans, fontSize: 15.5, color: C.text2, lineHeight: 1.75 }}>See how many assessments you have, how they're distributed across EPAs, and where you may have gaps. This helps you ensure you're getting sufficient data for an accurate picture of your development.</div>
              <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 600, color: C.amber, marginTop: 10 }}>Learn more below {"\u2193"}</div>
            </div>
          </div>

          {/* PURPOSE 2 */}
          <div onClick={() => scrollTo("data")} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 14, padding: "24px 24px", cursor: "pointer", transition: "border-color .15s, box-shadow .15s", display: "grid", gridTemplateColumns: "56px 1fr", gap: 18, alignItems: "start" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.boxShadow = "0 4px 16px rgba(154,123,44,.08)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "none"; }}>
            <div style={{ width: 56, height: 56, borderRadius: 14, background: C.greenSub, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{"\u{1F331}"}</div>
            <div>
              <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: C.green, textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Purpose 2</div>
              <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 700, color: C.text, marginBottom: 8, lineHeight: 1.3 }}>Promote your growth toward practice readiness</div>
              <div style={{ fontFamily: sans, fontSize: 15.5, color: C.text2, lineHeight: 1.75 }}>Your supervision trends and narrative comments give you actionable feedback to drive your development. Use them to identify strengths, notice growth areas, and build learning goals with your faculty coach.</div>
              <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 600, color: C.amber, marginTop: 10 }}>Learn more below {"\u2193"}</div>
            </div>
          </div>

          {/* PURPOSE 3 */}
          <div onClick={() => scrollTo("ccc")} style={{ background: C.surface, border: "1px solid " + C.border, borderRadius: 14, padding: "24px 24px", cursor: "pointer", transition: "border-color .15s, box-shadow .15s", display: "grid", gridTemplateColumns: "56px 1fr", gap: 18, alignItems: "start" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.boxShadow = "0 4px 16px rgba(154,123,44,.08)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow = "none"; }}>
            <div style={{ width: 56, height: 56, borderRadius: 14, background: "#EDE8F5", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 26 }}>{"\u{1F9ED}"}</div>
            <div>
              <div style={{ fontFamily: sans, fontSize: 12, fontWeight: 700, color: "#6B5B95", textTransform: "uppercase", letterSpacing: ".08em", marginBottom: 4 }}>Purpose 3</div>
              <div style={{ fontFamily: serif, fontSize: 20, fontWeight: 700, color: C.text, marginBottom: 8, lineHeight: 1.3 }}>Help you and your program assess where you are</div>
              <div style={{ fontFamily: sans, fontSize: 15.5, color: C.text2, lineHeight: 1.75 }}>The same data helps you and your program accurately understand where you are on your trajectory toward being able to perform the activities of a general pediatrician without supervision at the time of graduation. <span style={{ cursor: "pointer", color: C.amber, fontWeight: 600 }} onClick={e => { e.stopPropagation(); scrollTo("background"); }}>What does practice ready mean? {"\u2192"}</span></div>
              <div style={{ fontFamily: sans, fontSize: 13.5, fontWeight: 600, color: C.amber, marginTop: 10 }}>Learn more below {"\u2193"}</div>
            </div>
          </div>
        </div>

        <div style={{ background: C.amberSub, borderLeft: "3.5px solid " + C.amber, borderRadius: "0 10px 10px 0", padding: "16px 20px", margin: "0 0 4px", fontFamily: sans, fontSize: 15.5, fontWeight: 500, color: C.text, lineHeight: 1.65 }}>
          <strong>Current EPA assignments are developmental and are not reported to the ABP.</strong> They are intended to provide you with data to support your growth and to give your program more specific information to make decisions about your progress toward becoming practice ready.
        </div>
      </section>

      <SectionDivider />

      {/* ===== ASSESSMENT VOLUME ===== */}
      <Section id="volume">
        <H2 sub="How many assessments do I need?">Assessment Volume</H2>

        <Exp title="More data means a more accurate picture." open={true}>
          <p style={{ margin: 0 }}>We do not yet know how many assessments per EPA are needed to ensure your Clinical Competency Committee is making accurate and equitable decisions about your supervision needs, or how many are needed to give you a reliable sense of where you stand. What we do know is that the more assessments you have, the more accurate the picture becomes. This is by design: each individual assessment is meant to be low-stakes, just one small piece of a much bigger puzzle. The system works best when there are many pieces.</p>
        </Exp>

        <Exp title="Initiating works, even when it feels like it doesn't." open={true}>
          <p style={{ margin: 0 }}>If your program uses a model where you push assessments to faculty, the data show that the more you initiate, the more assessments you receive. The trade-off is that more pushes also mean more that go uncompleted. Try not to let that discourage you. The completed ones still add up and move you forward.</p>
        </Exp>

        <Exp title="Give each other grace.">
          <p style={{ margin: 0 }}>This is a learning curve for everyone. Faculty are learning how to use new tools and workflows at the same time you are. We know this can be frustrating {"\u2014"} and that's normal. Give each other grace as we all figure this out together. It gets better with time.</p>
        </Exp>
      </Section>

      <SectionDivider />

      {/* ===== DATA & PATTERNS ===== */}
      <Section id="data">
        <H2 sub="How to interpret what you see">Assessment Data & Progress</H2>
        <P>The data and visuals on your dashboard are designed to help you and your program track your progress toward needing less and less supervision over time, with the goal that by graduation you are practice ready across all of the General Pediatrics EPAs.</P>

        <Exp title="Look for patterns, not snapshots." open={true}>
          <p style={{ margin: "0 0 12px" }}>The graphs show you patterns over time. Look for growth, and also notice periods where growth may have plateaued or appears to have dropped.</p>
          <p style={{ margin: "0 0 12px" }}><strong>Normal growth is not always linear</strong> {"\u2014"} we have good days and days that aren't our best. We go from rotations that we feel comfortable and strong in to rotations where we might need more help and support. This is all normal. Dips and plateaus should be expected and provide an opportunity for reflection.</p>
          <p style={{ margin: 0 }}>A plateau might reflect your practice or it might reflect a gap in assessment data. If you see a plateau or dip, it's a great time to reflect: What's going on in this area? Do the narrative comments help me understand what I could work on? Can I use that information to build an action plan for myself?</p>
        </Exp>

        <Exp title="Don't rely on averages.">
          <p style={{ margin: 0 }}>Neither you nor your CCC should rely on numerical averages alone to determine supervision needs. Each supervision rating reflects a supervisor's retrospective judgment about how much supervision you needed for a specific past encounter. This is different from how much you will need in a future practice setting outside of a training environment. The supervision ratings, narrative comments, clinical context, sources of assessment, and patterns over time should all be interpreted together. No single number tells the story; the whole picture does.</p>
        </Exp>

        <Exp title="Your narrative comments are your richest source of feedback." open={true}>
          <p style={{ margin: "0 0 12px" }}>These are where you'll find both areas of strength and areas where you can focus to take your performance to the next level. In this type of assessment system, developmental feedback isn't always obvious {"\u2014"} it frequently lacks a label of "area for improvement" or "deficiency." And frequently, it's not a deficiency. It's normal growth in training.</p>
          <ExBox>
            <span>A faculty member might write that you <em style={{ color: C.text }}>"managed the acute visit well and chose the right antibiotic, but could strengthen discharge counseling by checking back with the family about their understanding of the medication plan."</em></span>
            <div style={{ marginTop: 10, fontWeight: 600, color: C.text }}>That's not a problem {"\u2014"} that's a growth opportunity sitting right inside an otherwise strong assessment.</div>
          </ExBox>
          <p style={{ margin: "0 0 12px" }}>The real power comes from looking <strong>across your comments over time</strong>. Notice the evolution: Are multiple faculty noting the same area for growth? Is something that used to come up no longer appearing? Are the expectations in your feedback getting progressively harder {"\u2014"} a sign you're being trusted with more? Are there themes in what you do well that you can build on?</p>
          <p style={{ margin: 0 }}>Use these patterns in conversation with your faculty coach to set concrete learning goals and build your individualized learning plan. The narrative data is there to serve your development, not just to document it.</p>
        </Exp>

        <Exp title="Not sure what to do with a comment?">
          <p style={{ margin: 0 }}>If you receive feedback and aren't sure what to make of it or how to act on it, that's okay {"\u2014"} and it's a great reason to bring it to your faculty coach or a trusted mentor. They can help you interpret the feedback in context and decide whether and how to incorporate it into your learning plan.</p>
        </Exp>

        <Exp title="Worried a rating may reflect bias?">
          <p style={{ margin: 0 }}>If you feel a rating or comment may reflect bias rather than your actual performance, that concern is valid and important. Bring it to a trusted member of your program or your faculty coach. One of the goals of this system is to improve equity by building structures that promote fairness and mitigate bias {"\u2014"} and that only works if concerns are surfaced.</p>
        </Exp>

        <Exp title="Faculty are still learning the scales.">
          <p style={{ margin: 0 }}>Faculty are still developing comfort with the supervision rating scales, and their numerical ratings may sometimes seem off to you or may not fully align with what they wrote in the narrative. This is a known challenge, especially early on, and it is one more reason why having more assessments helps. With a larger number of data points, individual rating inconsistencies matter much less, and the overall pattern becomes clearer for you and your program.</p>
        </Exp>
      </Section>

      <SectionDivider />

      {/* ===== CCC & 2028 ===== */}
      <Section id="ccc">
        <H2 sub="From frontline assessment to committee decisions">How Your Data Is Used</H2>

        <P>Your <Tip def="A group of faculty and educators responsible for monitoring your progress and making decisions about your supervision needs across all EPAs.">Clinical Competency Committee (CCC)</Tip> reviews and synthesizes your aggregate assessment data: supervision ratings, narrative comments, clinical context, and patterns over time.</P>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, margin: "8px 0 24px" }}>
          <div style={{ background: C.tint, border: "1px solid " + C.border, borderRadius: 14, padding: "22px 20px" }}>
            <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 17, color: C.text, marginBottom: 6 }}>Frontline Ratings</div>
            <div style={{ fontFamily: sans, fontSize: 15.5, color: C.text2, lineHeight: 1.7 }}><strong>Retrospective:</strong> a supervisor reflects on how much supervision you needed for one past encounter.</div>
          </div>
          <div style={{ background: C.amberSub, border: "1px solid " + C.accent, borderRadius: 14, padding: "22px 20px" }}>
            <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 17, color: C.text, marginBottom: 6 }}>CCC Decisions</div>
            <div style={{ fontFamily: sans, fontSize: 15.5, color: C.text2, lineHeight: 1.7 }}><strong>Prospective:</strong> "Could this trainee, practicing today without supervision, provide safe and effective care?"</div>
          </div>
        </div>

        <P>The approach described throughout this guide {"\u2014"} looking at patterns over snapshots, weighing narratives alongside ratings, understanding that growth isn't linear {"\u2014"} is the same approach your program and CCC should be using.</P>

        <Exp title="The CCC Level of Supervision Scale">
          <p style={{ margin: "0 0 14px" }}>Your CCC uses its own scale (aligned with but distinct from the SIMPL frontline scale) to make summative decisions. When a CCC assigns Level 5, you are practice ready for that EPA.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 0, background: C.surface, border: "1px solid " + C.border, borderRadius: 12, overflow: "hidden" }}>
            {CCC_SCALE.map((s, i) => (
              <div key={s.level} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px", borderTop: i > 0 ? "1px solid " + C.border : "none" }}>
                <div style={{ width: 30, height: 30, borderRadius: 7, background: C.amberSub, color: C.amber, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: 700, fontSize: 14, flexShrink: 0 }}>{s.level}</div>
                <div><span style={{ fontFamily: serif, fontWeight: 700, fontSize: 15, color: C.text }}>{s.title}: </span><span style={{ fontFamily: sans, fontSize: 14.5, color: C.text2 }}>{s.desc}</span></div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 14 }}>
            <LinkBtn href="https://www.abp.org/sites/public/files/pdf/cbme-supervision-scale-for-cccs.pdf">View the full CCC scale</LinkBtn>
          </div>
        </Exp>

        <Exp title="No single data point carries too much weight.">
          <p style={{ margin: 0 }}>With many data points from diverse faculty across settings and time, no single assessment should significantly influence a CCC determination. That's the whole point of frequent, low-stakes assessments.</p>
        </Exp>

        <Exp title="Preparing for 2028">
          <p style={{ margin: "0 0 12px" }}>Beginning in 2028, the ABP will require program directors to attest that graduates are practice ready across all EPAs as a prerequisite for initial certification. This replaces the current system where programs attest that graduates are "satisfactory" across general competency domains.</p>
          <p style={{ margin: 0 }}>Current EPA assignments are developmental and are <strong>not reported to the ABP</strong>. They are intended to provide you with data to support your growth and to give your program more specific information to make decisions about your progress toward becoming practice ready {"\u2014"} which will become consequential in 2028.</p>
        </Exp>
      </Section>

      <SectionDivider />

      {/* ===== BACKGROUND ===== */}
      <Section id="background">
        <H2 sub="Practice readiness, EPAs, and the platform">Background</H2>

        <P>This page is designed to help you understand and use your assessment data: to see where you are, track how you're growing, and identify where to focus next.</P>

        <Exp title="The goal of training: practice readiness" open={true}>
          <p style={{ margin: "0 0 12px" }}>Pediatric residency prepares you to perform the essential activities of a general pediatrician {"\u2014"} things like providing well-child care, managing acute illness, recognizing a severely ill child {"\u2014"} safely and effectively without someone assigned to direct or oversee your work. These essential activities are defined as <Tip def="Entrustable Professional Activities are the essential tasks that define what a pediatrician does. Each represents a unit of clinical work that can be observed, assessed, and \u2014 when a trainee is ready \u2014 entrusted to them without supervision.">Entrustable Professional Activities (EPAs)</Tip>, and the standard of being able to perform them at this level is what we call <em>practice ready</em>.</p>
          <p style={{ margin: "0 0 12px" }}><strong>Practice ready does not mean expert, and it does not mean complete independence.</strong> Pediatrics is inherently collaborative, and every practicing pediatrician works within systems of consultation, referral, and team-based care. Practice ready means you can be trusted to perform these essential activities without someone assigned to direct or oversee your work {"\u2014"} not that you practice without ever needing input or support.</p>
          <p style={{ margin: "0 0 12px" }}><strong>You are not expected to be practice ready on day one of residency.</strong> It takes time to develop the skills and get the exposure needed. That's the point of training. <strong>Practice ready is a foundation {"\u2014"} not a ceiling {"\u2014"}</strong> that you may advance beyond during training, and this standard <strong>is the same for everyone</strong> regardless of career path.</p>
          <div style={{ background: C.amberSub, borderLeft: "3px solid " + C.amber, borderRadius: "0 8px 8px 0", padding: "12px 16px", margin: "4px 0 4px", fontFamily: serif, fontSize: 15.5, fontWeight: 600, color: C.text, lineHeight: 1.5 }}>
            The required outcome of training for graduation and to be eligible to become board certified is to be practice ready across all of the General Pediatrics EPAs.
          </div>
        </Exp>

        <Exp title="What are EPAs?">
          <p style={{ margin: "0 0 12px" }}>Entrustable Professional Activities (EPAs) are the 12 essential tasks that define what a general pediatrician does. Instead of asking "does this resident have enough medical knowledge?", the system asks "can this resident manage an acutely ill child?" or "can this resident provide a well-child visit?"</p>
          <div style={{ marginTop: 8 }}>
            <LinkBtn href="https://www.abp.org/sites/public/files/pdf/epas-general-pediatrics-summary.pdf">View the 12 EPAs</LinkBtn>
          </div>
        </Exp>

        <Exp title="How is this different from old evaluations?">
          <p style={{ margin: "0 0 14px" }}>You may be familiar with end-of-rotation evaluations: a faculty member completes a form days or weeks later, summarizing general impressions. The ABP/SIMPL platform takes a fundamentally different approach.</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, margin: "0 0 4px" }}>
            {[{ t: "End-of-Rotation (Old)", items: ["One form per rotation", "Completed days/weeks later", "Based on general impressions", "Vague, hard to act on"], bad: true },
              { t: "Workplace-Based (SIMPL)", items: ["Many forms per rotation", "Completed close to encounters", "Tied to specific activities", "Specific, actionable feedback"], bad: false }
            ].map((col, ci) => (
              <div key={ci} style={{ background: col.bad ? C.tint : C.amberSub, border: "1px solid " + C.border, borderRadius: 12, padding: "16px 14px" }}>
                <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 14.5, color: C.text, marginBottom: 10 }}>{col.t}</div>
                {col.items.map((item, j) => <div key={j} style={{ fontFamily: sans, fontSize: 14, color: C.text2, lineHeight: 1.6, paddingLeft: 14, position: "relative", marginBottom: 4 }}><span style={{ position: "absolute", left: 0, fontWeight: 700 }}>{col.bad ? "\u2013" : "\u2713"}</span>{item}</div>)}
              </div>
            ))}
          </div>
        </Exp>

        <Exp title="What types of assessment forms are there?">
          <p style={{ margin: "0 0 12px" }}><strong>EPA-Based Forms:</strong> The core of the platform. Each maps to one of the 12 General Pediatrics EPAs and includes a supervision rating, required narrative comments (often dictated via voice-to-text), and clinical context. Forms take 1-3 minutes. Form titles use plain clinical language ("Acute Common Problem"), not formal EPA names.</p>
          <p style={{ margin: "0 0 12px" }}><strong>Narrative-Only Forms (KSAs):</strong> Written feedback (no supervision rating) on cross-cutting knowledge, skills, and abilities essential to all EPAs: knowing limits and seeking help, communicating with patients and families, collaborating with others, professional behaviors, high-value care, promoting health equity, and learning and growth behaviors.</p>
          <p style={{ margin: 0 }}><strong>Longitudinal Continuity Clinic Assessment:</strong> Completed by your continuity clinic preceptor based on observations over multiple encounters rather than a single visit. Because your preceptor observes you in the general pediatrics practice environment over time, they bring an inherent understanding of what is expected of a general pediatrician in practice, making this data particularly valuable.</p>
        </Exp>

        <Exp title="What does the supervision scale mean?">
          <p style={{ margin: "0 0 14px" }}>Each EPA-based assessment includes a rating: <em>How much supervision did the resident need when performing this activity?</em> This refers to supervision from any supervisor involved {"\u2014"} not just the person completing the form.</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 0, margin: "0 0 10px", background: C.surface, border: "1px solid " + C.border, borderRadius: 12, overflow: "hidden" }}>
            {SCALE.map((s, i) => (
              <button key={s.level} onClick={() => setSelLevel(selLevel === s.level ? null : s.level)}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", cursor: "pointer", textAlign: "left", border: "none", borderTop: i > 0 ? "1px solid " + C.border : "none", background: selLevel === s.level ? C.tint : "transparent", transition: "background .15s", width: "100%" }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: s.color + "18", color: s.color, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: serif, fontWeight: 700, fontSize: 15, flexShrink: 0 }}>{s.level}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontFamily: serif, fontSize: 14.5, fontWeight: 700, color: C.text }}>{s.title}</div>
                  <div style={{ fontFamily: sans, fontSize: 13, color: C.text2 }}>{s.short}</div>
                </div>
                <span style={{ color: C.amber, fontSize: 12, fontWeight: 700, transition: "transform .2s", transform: selLevel === s.level ? "rotate(90deg)" : "rotate(0)" }}>{"\u25B8"}</span>
              </button>
            ))}
          </div>
          {selLevel && (() => { const s = SCALE.find(x => x.level === selLevel); return (
            <div style={{ background: C.amberSub, border: "1px solid " + C.accent, borderRadius: 10, padding: "14px 16px", margin: "8px 0 12px", fontFamily: sans, fontSize: 15, lineHeight: 1.7, color: C.text }}>
              <span style={{ fontWeight: 700, color: s.color }}>Level {s.level}:</span> {s.detail}
            </div>
          ); })()}
          <p style={{ fontFamily: sans, fontSize: 13.5, color: C.text2, fontStyle: "italic", margin: "8px 0 0", lineHeight: 1.6 }}>Each rating is retrospective: how much supervision was needed for this encounter, not how much was delivered, and not what you would need in future practice.</p>
        </Exp>
      </Section>

      {/* FOOTER */}
      <div style={{ background: C.surface, borderTop: "1px solid " + C.border, marginTop: 16 }}>
        <div style={{ maxWidth: 960, margin: "0 auto", padding: "32px 32px", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 24 }}>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: C.tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 17 }}>{"\u{1F91D}"}</div>
            <div>
              <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 16, color: C.text, marginBottom: 4 }}>Concerns about your assessments?</div>
              <div style={{ fontFamily: sans, fontSize: 15, color: C.text2, lineHeight: 1.65 }}>Please reach out to a trusted member of your program. Your voice helps us create stronger and more equitable systems.</div>
            </div>
          </div>
          <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
            <div style={{ width: 36, height: 36, borderRadius: 10, background: C.tint, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 17 }}>{"\u{1F4A1}"}</div>
            <div>
              <div style={{ fontFamily: serif, fontWeight: 700, fontSize: 16, color: C.text, marginBottom: 4 }}>Platform or dashboard questions?</div>
              <div style={{ fontFamily: sans, fontSize: 15, color: C.text2, lineHeight: 1.65 }}>Reach out to the SIMPL team at <strong style={{ color: C.amber }}>[simpl-support@email.com]</strong></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
